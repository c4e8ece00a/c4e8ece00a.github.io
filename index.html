<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Наша любовь: С 2004 года</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Marck+Script&family=Montserrat:wght@300;400;700&display=swap');
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0;
            padding: 0;
        }
        
        body {
            background: #000;
            color: white;
            font-family: 'Montserrat', sans-serif;
            /* Используем динамическую высоту вьюпорта для мобилок */
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: fixed; /* Предотвращает "прыжки" при скролле */
            width: 100%;
        }

        .game-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .scene-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        /* --- СЕКЦИЯ ВАШИХ ФОТО --- */
        /* Замените названия файлов на свои, если они лежат в той же папке на GitHub */
        .bg-2004-school { background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('IMG_8701.PNG'); }
        .bg-school-walk { background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('camphoto_959030623.jpg'); }
        .bg-separate-cities { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('img1345.jpg'); }
        .bg-social-like { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('IMG_8689[1].PNG'); }
        .bg-cafe-meet { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('IMG_8706.PNG'); }
        .bg-dating { background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('IMG_3234.JPG'); }
        .bg-wedding { background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('IMG_5988.JPG'); }
        .bg-wedding-ring { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('IMG_8695.PNG'); }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Градиент стал более глубоким снизу для читаемости текста */
            background: linear-gradient(to bottom, 
                transparent 0%, 
                rgba(0,0,0,0.2) 50%, 
                rgba(0,0,0,0.85) 100%);
            z-index: 2;
        }

        #ui-layer {
            position: absolute;
            bottom: 0; 
            left: 0; 
            right: 0;
            padding: 20px;
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        #dialog-box {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        #speaker-name {
            color: #f472b6;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        #text {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.95);
        }

        .choice-btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            color: white;
            text-align: center;
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .choice-btn:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.1);
        }

        .title-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            transition: opacity 1s ease;
        }

        .handwritten {
            font-family: 'Marck Script', cursive;
            font-size: clamp(3rem, 15vw, 5rem);
            background: linear-gradient(to right, #f472b6, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .fade-out { opacity: 0; pointer-events: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- ТИТУЛЬНЫЙ ЭКРАН -->
        <div id="title-screen" class="title-screen">
            <h1 class="handwritten">Наша любовь</h1>
            <p class="text-indigo-200 tracking-[0.3em] text-xs mb-12 uppercase font-medium">История с 2004 года</p>
            <button onclick="startPlay()" class="bg-white text-indigo-950 px-12 py-5 rounded-full font-bold text-lg shadow-2xl active:scale-90 transition-transform">
                Начать историю 💕
            </button>
        </div>

        <div id="bg" class="scene-bg"></div>
        <div class="overlay"></div>

        <div id="ui-layer" class="hidden">
            <div id="dialog-box">
                <div id="speaker-name">Дима</div>
                <div id="text">...</div>
                <div id="choices"></div>
            </div>
        </div>
    </div>

    <script>
        const scenes = [
            {
                bgClass: 'bg-2004-school',
                speaker: 'Дима',
                text: '2004 год. Мне 10 лет. Я классе новенький, только перевелся из другого района. Войдя в класс первый раз я увидел Её. Она была просто шикарна! Мое сердце забилось чаще...',
                choices: [{ text: 'Она мне очень понравилась ❤️', next: 1 }]
            },
            {
                bgClass: 'bg-school-walk',
                speaker: 'Дима',
                text: 'Спустя какое то время мы начали общаться. Я провожал её до дома, носил портфель, один раз помогал с уроками. Но тогда я был лишь верным другом...',
                choices: [{ text: 'Прошли школьные годы 😔', next: 2 }]
            },
            {
                bgClass: 'bg-separate-cities',
                speaker: 'Дима',
                text: 'После школы жизнь развела нас. Разные города, учёба, работа, новые знакомства. Связь оборвалась на долгих 12 лет...',
                choices: [{ text: 'Но судьба ждала своего часа...', next: 3 }]
            },
            {
                bgClass: 'bg-social-like',
                speaker: 'Дима',
                text: '7 марта 2024 года. Я увидел её лайк в соцсети под своим фото и как оказалось он перевернул всё. Я решил написать ей, мы начали переписываться и договорились встретиться на следующий день.',
                choices: [{ text: 'Договориться о встрече в кафе ☕', next: 4 }]
            },
            {
                bgClass: 'bg-cafe-meet',
                speaker: 'Катя',
                text: 'Вечер в кафе. Мы смеялись, вспоминая школьные годы, восполняли пробелы 12 летнего перерыва. И когда мы решили что нужно встретиться еще, я вдруг спросила: "А **** будет?". И по моему этот вопрос был неожиданным для нас двоих. Он ответил не раздумывая!',
                choices: [{ text: '"Да!" — и это было начало новой главы 😏', next: 5 }]
            },
            {
                bgClass: 'bg-dating',
                speaker: 'Дима',
                text: 'Любовь вспыхнула ярче, чем когда-либо. Мы поняли, что 12 лет разлуки были лишь подготовкой к этому моменту.',
                choices: [{ text: 'Спустя год мы решили пожениться 💒', next: 6 }]
            },
            {
                bgClass: 'bg-wedding',
                speaker: 'Свадебный ведущий',
                text: 'Под звуки марша Мендельсона вы стали мужем и женой. Официально и навсегда.',
                choices: [{ text: 'Но впереди был самый важный шаг 💍', next: 7 }]
            },
            {
                bgClass: 'bg-wedding-ring',
                speaker: 'Финал',
                text: 'Венчание. Перед небом и землей мы закрепили свой союз. С 2004 года и на всю жизнь! Счастливого брака! ❤️',
                choices: [{ text: 'Прожить историю снова 🔄', next: 0 }]
            }
        ];

        let currentScene = 0;

        function startPlay() {
            document.getElementById('title-screen').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('title-screen').style.display = 'none';
                document.getElementById('ui-layer').classList.remove('hidden');
                updateScene();
            }, 1000);
        }

        function updateScene() {
            const scene = scenes[currentScene];
            const bg = document.getElementById('bg');
            const choicesContainer = document.getElementById('choices');
            
            // Плавная смена фона
            bg.style.opacity = 0;
            setTimeout(() => {
                bg.className = `scene-bg ${scene.bgClass}`;
                bg.style.opacity = 1;
            }, 100);
            
            document.getElementById('speaker-name').textContent = scene.speaker;
            document.getElementById('text').textContent = scene.text;
            
            choicesContainer.innerHTML = '';
            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice.text;
                btn.onclick = () => {
                    currentScene = choice.next;
                    updateScene();
                };
                choicesContainer.appendChild(btn);
            });
        }
        
        // Предотвращение зума при кликах на iOS
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
